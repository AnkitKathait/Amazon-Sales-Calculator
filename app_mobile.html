<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Amazon Sales Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
:root{
  --orange:#FF9900;--dark:#131921;--navy:#232F3E;--slate:#37475A;
  --green:#0A7C5C;--red:#C0392B;--purple:#7D3C98;--blue:#1565C0;
  --bg:#ECEEF2;--card:#fff;--border:#DDE1E7;--txt1:#131921;--txt2:#5A6475;--r:12px;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt1);font-size:14px;padding-bottom:env(safe-area-inset-bottom,0px)}

/* ── TOPBAR ── */
.topbar{background:var(--dark);height:52px;padding:0 12px 0 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.tb-logo{font-size:17px;font-weight:800;color:#fff}.tb-logo span{color:var(--orange)}
.tb-actions{display:flex;gap:6px;align-items:center}
.tb-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);width:38px;height:38px;border-radius:8px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:opacity .15s}
.tb-btn.success{background:#2ECC71;border-color:#27AE60}
.tb-btn:active{opacity:.65}

/* ── MAIN ── */
.main{padding:12px 10px 88px}

/* ── CONTROLS ── */
.controls{background:var(--navy);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ctrl-lbl{font-size:9px;font-weight:700;color:#8fa0b0;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.ctrl-sw{position:relative;flex:1}
.ctrl-sw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--orange);pointer-events:none;font-size:11px}
.ctrl-sw.narrow{flex:0 0 90px}
.ctrl-select,.ctrl-year{width:100%;background:var(--slate);color:#fff;border:1.5px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 26px 8px 10px;font-size:12px;font-weight:600;min-height:40px;outline:none;appearance:none;cursor:pointer}
.ctrl-select:focus,.ctrl-year:focus{border-color:var(--orange)}

/* ── SUMMARY CARDS ── */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sc-full{grid-column:1/-1}
.sc{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:12px 10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sc-lbl{font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-val{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
.sc-val.orange{color:var(--orange)}.sc-val.green{color:var(--green)}.sc-val.red{color:var(--red)}.sc-val.blue{color:var(--blue)}
.sc-sub{font-size:9px;color:var(--txt2);margin-top:2px}

/* ── DAYS WRAP ── */
.days-wrap{display:flex;flex-direction:column;gap:4px}
.week-group{display:flex;flex-direction:column;gap:3px}
.week-label{display:flex;align-items:center;gap:8px;padding:8px 2px 3px}
.week-label-text{font-size:9.5px;font-weight:800;color:#A0AABB;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.week-label-line{flex:1;height:1px;background:#E4E7EC}

/* ── DAY BLOCK ── */
.day-block{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden;transition:box-shadow .2s,border-color .2s}
.day-block.has-data{border-color:#B8DEC9}
.day-block.today{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,153,0,.18)}
.day-block.expanded{box-shadow:0 4px 20px rgba(0,0,0,.1)}

/* ── DAY HEADER ── */
.day-hdr{display:flex;align-items:stretch;cursor:pointer;user-select:none;min-height:56px;transition:background .15s}
.day-hdr:active{background:#F5F7FA}
.day-block.expanded .day-hdr{background:var(--dark)}
.day-block.expanded .day-hdr *{color:rgba(255,255,255,.88)!important}
.day-block.today:not(.expanded) .day-hdr{background:linear-gradient(100deg,#FFFBF2,#FFF9F0 60%,#FAFAFA)}

.dh-left{display:flex;align-items:center;justify-content:center;width:52px;flex-shrink:0;border-right:1px solid #EAECF0;transition:border-color .15s}
.day-block.expanded .dh-left{border-right-color:rgba(255,255,255,.12)!important}
.dh-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;background:#ECEEF2;color:#7A8494;flex-shrink:0;letter-spacing:-.5px}
.day-block.today .dh-circle{background:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(255,153,0,.45)}
.day-block.weekend:not(.today) .dh-circle{background:#EDE9F7;color:var(--purple)}
.day-block.has-data:not(.today):not(.weekend) .dh-circle{background:#E1F2E9;color:var(--green)}
.day-block.expanded .dh-circle{background:rgba(255,255,255,.14)!important;color:rgba(255,255,255,.9)!important;box-shadow:none!important}

.dh-mid{flex:1;padding:8px 8px;min-width:0;display:flex;align-items:center;gap:8px}
.dh-info-col{display:flex;flex-direction:column;flex-shrink:0;width:46px}
.dh-dayname{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);margin-bottom:1px}
.day-block.weekend:not(.today):not(.expanded) .dh-dayname{color:var(--purple)}
.day-block.today:not(.expanded) .dh-dayname{color:var(--orange)}
.dh-date-txt{font-size:12px;font-weight:700;color:var(--txt1)}

.dh-stats{display:flex;gap:10px;flex:1;min-width:0;overflow:hidden;align-items:center}
.stat-col{display:flex;flex-direction:column;min-width:0}
.stat-lbl{font-size:7.5px;font-weight:700;color:#A0AABB;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.stat-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.sv-orders{color:#C2620A}.sv-rev{color:#1A56B0}.sv-profit{color:#0B6E4F}.sv-loss{color:#A8200D}
.dh-empty{font-size:10px;color:#BCC5D0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.dh-right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:6px 8px;flex-shrink:0;width:58px;border-left:1px solid rgba(0,0,0,.05)}
.day-block.expanded .dh-right{border-left-color:rgba(255,255,255,.1)!important}
.today-tag{background:var(--orange);color:#fff;font-size:7.5px;font-weight:800;padding:2px 5px;border-radius:8px;white-space:nowrap}
.dh-qadd{background:rgba(255,153,0,.12);border:1.5px solid rgba(255,153,0,.35);color:var(--orange);padding:4px 8px;border-radius:6px;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s}
.dh-qadd:active{background:rgba(255,153,0,.25)}
.day-block.expanded .dh-qadd{visibility:hidden}
.dh-chev{font-size:12px;color:var(--txt2);transition:transform .25s;line-height:1}
.day-block.expanded .dh-chev{transform:rotate(180deg);color:rgba(255,255,255,.65)!important}

/* ── DAY BODY ── */
.day-body{display:none;border-top:1px solid var(--border)}
.day-block.expanded .day-body{display:block}

/* ── ORDER CARDS ── */
.orders-list{display:flex;flex-direction:column}
.order-card{padding:10px 12px;border-bottom:1px solid #F0F2F4}
.order-card:last-child{border-bottom:none}
.oc-row1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.oc-sku-in{flex:1;border:none;font-size:13px;font-weight:600;color:var(--txt1);background:transparent;outline:none;padding:2px 0;min-width:0;font-family:inherit}
.oc-sku-in:focus{color:var(--orange)}
.oc-sku-in::placeholder{color:#C5CDD6;font-weight:400}
.pb{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.pb.pos{color:var(--green);background:#EAF6F1}.pb.neg{color:var(--red);background:#FDECEA}.pb.zer{color:var(--txt2);background:#F3F4F6}
.oc-fields{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.oc-field{display:flex;flex-direction:column;align-items:center}
.oc-field-lbl{font-size:7.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;white-space:nowrap}
.oc-field input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:6px 2px;font-size:11px;text-align:center;background:#F9FAFB;font-family:inherit;outline:none;font-variant-numeric:tabular-nums;transition:border-color .12s,background .12s}
.oc-field input:focus{border-color:var(--orange);background:#FFF8EE}
.oc-row3{display:flex;justify-content:flex-end;margin-top:6px}
.del-btn{background:#F5F6F8;border:1px solid #DDE1E7;color:#8A95A3;font-size:12px;font-weight:700;width:26px;height:26px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.del-btn:active{background:#FDECEA;border-color:#F5C6C2;color:var(--red)}

/* ── DAY TOTALS ── */
.day-totals{background:#EEF2F7;padding:8px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-top:1px solid var(--border)}
.dt-item{display:flex;flex-direction:column;align-items:center}
.dt-lbl{font-size:7.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px}
.dt-val{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums}
.dt-val.green{color:var(--green)}.dt-val.red{color:var(--red)}.dt-val.blue{color:var(--blue)}

/* ── ADD ORDER BTN ── */
.add-order-btn{width:100%;padding:11px;background:#F7F8FA;border:1.5px dashed #C5CDD6;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .15s}
.add-order-btn:active{background:#FFF5E6;border-color:var(--orange);color:var(--orange)}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:16px;width:54px;height:54px;background:var(--orange);color:var(--dark);border:none;border-radius:50%;font-size:26px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,153,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.9);box-shadow:0 2px 8px rgba(255,153,0,.4)}

/* ── MODAL (BOTTOM SHEET) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end}
.overlay.on{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.overlay.on .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:#DDE1E7;border-radius:4px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:800;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.single{grid-template-columns:1fr}
.fg label{font-size:10px;font-weight:700;color:var(--txt2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;min-height:46px;background:#fff}
.fg input:focus,.fg select:focus{border-color:var(--orange)}
.auto-hint{font-size:10px;color:var(--orange);margin-top:3px;font-weight:600;display:none}
.auto-hint.show{display:block}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.m-btn{flex:1;padding:13px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;min-height:50px}
.m-btn.ok{background:var(--orange);color:var(--dark)}.m-btn.ok:active{background:#E88A00}
.m-btn.cancel{background:#F0F2F5;color:var(--txt1)}.m-btn.cancel:active{background:#E5E7EA}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:all .25s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);transition:opacity .3s,visibility .3s}
.loading-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-spinner{width:38px;height:38px;border:3px solid #E0E0E0;border-top:3px solid var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">Amazon Sales <span>Calculator</span></div>
  <div class="tb-actions">
    <button class="tb-btn" onclick="exportData()" title="Export">⬇</button>
    <label class="tb-btn" style="cursor:pointer" title="Import">
      ⬆<input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
  </div>
</div>

<div class="main">
  <div class="controls">
    <span class="ctrl-lbl">Month</span>
    <div class="ctrl-sw">
      <select class="ctrl-select" id="selMonth" onchange="renderMonth()">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
    </div>
    <div class="ctrl-sw narrow">
      <select class="ctrl-year" id="selYear" onchange="renderMonth()">
        <option>2020</option><option>2021</option><option>2022</option>
        <option>2023</option><option>2024</option><option>2025</option>
        <option>2026</option><option>2027</option><option>2028</option>
        <option>2029</option><option>2030</option><option>2031</option>
        <option>2032</option><option>2033</option><option>2034</option><option>2035</option>
      </select>
    </div>
  </div>

  <div class="sum-grid">
    <div class="sc"><div class="sc-lbl">Orders</div><div class="sc-val orange" id="sc-orders">0</div><div class="sc-sub">This month</div></div>
    <div class="sc"><div class="sc-lbl">Revenue</div><div class="sc-val blue" id="sc-rev">₹0.00</div><div class="sc-sub">Selling price</div></div>
    <div class="sc"><div class="sc-lbl">Shipping</div><div class="sc-val" id="sc-ship">₹0.00</div><div class="sc-sub">Shipping fees</div></div>
    <div class="sc"><div class="sc-lbl">Amazon Fees</div><div class="sc-val" id="sc-fees">₹0.00</div><div class="sc-sub">Platform fees</div></div>
    <div class="sc"><div class="sc-lbl">Product Cost</div><div class="sc-val" id="sc-cost">₹0.00</div><div class="sc-sub">Cost of goods</div></div>
    <div class="sc"><div class="sc-lbl">RTO / Loss</div><div class="sc-val red" id="sc-rto">₹0.00</div><div class="sc-sub">Returns</div></div>
    <div class="sc sc-full"><div class="sc-lbl">Net Profit</div><div class="sc-val green" id="sc-net">₹0.00</div><div class="sc-sub">Final profit this month</div></div>
  </div>

  <div class="days-wrap" id="daysWrap"></div>
</div>

<button class="fab" onclick="openModal()" title="Add Order">＋</button>

<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Order</div>
    <div class="form-row single"><div class="fg"><label>Day</label><select id="mDay"></select></div></div>
    <div class="form-row single"><div class="fg"><label>SKU / Order Name</label><input type="text" id="mSku" placeholder="e.g. Blue T-Shirt XL" autocomplete="off"/></div></div>
    <div class="form-row">
      <div class="fg">
        <label>Selling Price (₹)</label>
        <input type="number" id="mSell" placeholder="0.00" min="0" step="0.01" oninput="modalAutoFill()"/>
        <div class="auto-hint" id="mSellHint"></div>
      </div>
      <div class="fg"><label>Shipping (₹) — def 65</label><input type="number" id="mShip" placeholder="65" min="0" step="0.01"/></div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label>Product Cost (₹)</label>
        <input type="number" id="mCost" placeholder="0.00" min="0" step="0.01" oninput="modalFeesAutoFill()"/>
        <div class="auto-hint" id="mCostHint"></div>
      </div>
      <div class="fg">
        <label>Amazon Fees (₹)</label>
        <input type="number" id="mFees" placeholder="0.00" min="0" step="0.01"/>
        <div class="auto-hint" id="mFeesHint"></div>
      </div>
    </div>
    <div class="form-row single"><div class="fg"><label>RTO / Loss (₹)</label><input type="number" id="mRto" placeholder="0.00" min="0" step="0.01"/></div></div>
    <div class="modal-actions">
      <button class="m-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="m-btn ok" onclick="quickAdd()">Add Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg">Done!</span></div>

<script>
/* ═══════════════════════════ DATA STORE ═══════════════════════════ */
let store = {};
function getMonthStore(y,m){if(!store[y])store[y]={};if(!store[y][m])store[y][m]={};return store[y][m]}
function getDayRows(y,m,d){const ms=getMonthStore(y,m);if(!ms[d])ms[d]=[];return ms[d]}

/* ═══════════════════════════ SUPABASE ═══════════════════════════ */
const SUPABASE_URL='https://jopulgsuccysuhoadvim.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvcHVsZ3N1Y2N5c3Vob2FkdmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDkwNjEsImV4cCI6MjA5MDY4NTA2MX0.ce8qnEHef4SmSmsegoNJ8El3_hpA51RpR8JToFM7Vm8';
let supabase = null;

async function initSB(){
  if(supabase)return supabase;
  try{
    const m=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    supabase=m.createClient(SUPABASE_URL,SUPABASE_KEY);return supabase;
  }catch{
    if(typeof window.supabase!=='undefined'){supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);return supabase;}
    return null;
  }
}

async function loadFromSB(){
  try{
    const sb=await initSB();if(!sb)return;
    const{data,error}=await sb.from('orders').select('*').order('created_at',{ascending:true});
    if(error)throw error;
    store={};
    data.forEach(o=>getDayRows(o.year,o.month,o.day).push({id:o.id,sku:o.sku||'',sell:+o.sell||0,ship:+o.ship||0,fees:+o.fees||0,cost:+o.cost||0,rto:+o.rto||0}));
  }catch{showToast('⚠ Using local data')}
}

async function saveSB(y,m,d,i){
  const row=getDayRows(y,m,d)[i];if(!row)return;
  try{
    const sb=await initSB();if(!sb)return;
    const p={year:y,month:m,day:d,sku:row.sku||'',sell:row.sell||0,ship:row.ship||0,fees:row.fees||0,cost:row.cost||0,rto:row.rto||0};
    if(row.id){await sb.from('orders').update(p).eq('id',row.id);}
    else{const{data,error}=await sb.from('orders').insert(p).select().single();if(!error)row.id=data.id;}
  }catch{showToast('⚠ Save failed')}
}

async function deleteSB(row){
  if(!row?.id)return;
  try{const sb=await initSB();if(sb)await sb.from('orders').delete().eq('id',row.id);}catch{}
}

/* ═══════════════════════════ UTILS ═══════════════════════════ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DEF_SHIP=65;
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function wdName(y,m,d){return WDAYS[new Date(y,m,d).getDay()]}
function wdIdx(y,m,d){return new Date(y,m,d).getDay()}
function isWeekend(y,m,d){const w=wdIdx(y,m,d);return w===0||w===6}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d}
function curY(){return parseInt(document.getElementById('selYear').value)||new Date().getFullYear()}
function curM(){return parseInt(document.getElementById('selMonth').value)}
function fmtM(n){return'₹'+Number(n||0).toFixed(2)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function autoCost(s){if(s>0&&s<500)return 250;if(s>=500)return 300;return 0}
function autoFees(c){if(c>0&&c<500)return 25.96;if(c>=500&&c<999)return 53.10;return 0}
function rowProfit(r){return(r.sell||0)-(r.ship||0)-(r.fees||0)-(r.cost||0)-(r.rto||0)}
function calcStats(rows){
  let rev=0,ship=0,fees=0,cost=0,rto=0;
  rows.forEach(r=>{rev+=r.sell||0;ship+=r.ship||0;fees+=r.fees||0;cost+=r.cost||0;rto+=r.rto||0});
  return{rev,ship,fees,cost,rto,net:rev-ship-fees-cost-rto}
}

/* ═══════════════════════════ RENDER MONTH ═══════════════════════════ */
function renderMonth(){
  const y=curY(),m=curM();
  const wrap=document.getElementById('daysWrap');
  wrap.innerHTML='';
  let weekGroup=null,weekNum=0;
  for(let d=1,days=daysInMonth(y,m);d<=days;d++){
    const dow=wdIdx(y,m,d);
    if(d===1||dow===0){
      weekNum++;
      weekGroup=document.createElement('div');
      weekGroup.className='week-group';
      const lbl=document.createElement('div');lbl.className='week-label';
      lbl.innerHTML=`<span class="week-label-text">Week ${weekNum}</span><span class="week-label-line"></span>`;
      weekGroup.appendChild(lbl);wrap.appendChild(weekGroup);
    }
    weekGroup.appendChild(buildDayBlock(y,m,d));
  }
  updateSummary(y,m);
  if(y===new Date().getFullYear()&&m===new Date().getMonth()){
    const td=new Date().getDate();
    const b=document.getElementById(`db-${y}-${m}-${td}`);
    if(b)setTimeout(()=>b.scrollIntoView({behavior:'smooth',block:'center'}),250);
  }
}

/* ═══════════════════════════ BUILD DAY BLOCK ═══════════════════════════ */
function buildDayBlock(y,m,d){
  const rows=getDayRows(y,m,d);
  const today=isToday(y,m,d),weekend=isWeekend(y,m,d);
  const stats=calcStats(rows);
  const block=document.createElement('div');
  block.id=`db-${y}-${m}-${d}`;
  block.className='day-block'+(today?' today':'')+(weekend?' weekend':'')+(rows.length?' has-data':'');

  const statsHtml=rows.length
    ? `<div class="stat-col"><div class="stat-lbl">Orders</div><div class="stat-val sv-orders">${rows.length}</div></div>
       <div class="stat-col"><div class="stat-lbl">Revenue</div><div class="stat-val sv-rev">${fmtM(stats.rev)}</div></div>
       <div class="stat-col"><div class="stat-lbl">Profit</div><div class="stat-val ${stats.net<0?'sv-loss':'sv-profit'}">${stats.net<0?'↓':'↑'}${fmtM(stats.net)}</div></div>`
    : `<span class="dh-empty">No orders — tap ＋ to add</span>`;

  block.innerHTML=`
    <div class="day-hdr" onclick="toggleDay(this)">
      <div class="dh-left"><div class="dh-circle">${d}</div></div>
      <div class="dh-mid">
        <div class="dh-info-col">
          <div class="dh-dayname">${wdName(y,m,d)}</div>
          <div class="dh-date-txt">${d} ${MONTHS[m].slice(0,3)}</div>
        </div>
        <div class="dh-stats" id="dhs-${y}-${m}-${d}">${statsHtml}</div>
      </div>
      <div class="dh-right">
        ${today?'<span class="today-tag">TODAY</span>':''}
        <div class="dh-chev">▾</div>
      </div>
    </div>
    <div class="day-body" id="dbody-${y}-${m}-${d}">
      <div class="orders-list" id="olist-${y}-${m}-${d}"></div>
      <div class="day-totals" id="dtot-${y}-${m}-${d}" style="display:none"></div>
      <button class="add-order-btn" onclick="addRow(${y},${m},${d})">＋ Add Order Row</button>
    </div>`;

  rows.forEach((_,i)=>appendRowEl(y,m,d,i,block));
  renderTotals(y,m,d,block);
  return block;
}

/* ═══════════════════════════ ORDER CARD ═══════════════════════════ */
function appendRowEl(y,m,d,i,block){
  const list=block?block.querySelector(`#olist-${y}-${m}-${d}`):document.getElementById(`olist-${y}-${m}-${d}`);
  if(!list)return;
  const r=getDayRows(y,m,d)[i];
  const p=rowProfit(r),pcls=p>0?'pos':p<0?'neg':'zer';
  const card=document.createElement('div');
  card.className='order-card';card.id=`row-${y}-${m}-${d}-${i}`;
  card.innerHTML=`
    <div class="oc-row1">
      <input class="oc-sku-in" type="text" placeholder="Order name / SKU" value="${esc(r.sku||'')}"
        onchange="setTxt(${y},${m},${d},${i},'sku',this.value)"/>
      <span class="pb ${pcls}" id="pc-${y}-${m}-${d}-${i}">${fmtM(p)}</span>
    </div>
    <div class="oc-fields">
      <div class="oc-field"><div class="oc-field-lbl">Sell ₹</div>
        <input type="number" placeholder="0" min="0" step="0.01" value="${r.sell||''}" id="sell-${y}-${m}-${d}-${i}"
          oninput="setNum(${y},${m},${d},${i},'sell',this.value)"/></div>
      <div class="oc-field"><div class="oc-field-lbl">Ship ₹</div>
        <input type="number" placeholder="${DEF_SHIP}" min="0" step="0.01" value="${r.ship!==undefined?r.ship:''}"
          oninput="setNum(${y},${m},${d},${i},'ship',this.value)"/></div>
      <div class="oc-field"><div class="oc-field-lbl">Fees ₹</div>
        <input type="number" placeholder="0" min="0" step="0.01" value="${r.fees||''}" id="fees-${y}-${m}-${d}-${i}"
          oninput="setNum(${y},${m},${d},${i},'fees',this.value)"/></div>
      <div class="oc-field"><div class="oc-field-lbl">Cost ₹</div>
        <input type="number" placeholder="0" min="0" step="0.01" value="${r.cost||''}" id="cost-${y}-${m}-${d}-${i}"
          oninput="setNum(${y},${m},${d},${i},'cost',this.value)"/></div>
      <div class="oc-field"><div class="oc-field-lbl">RTO ₹</div>
        <input type="number" placeholder="0" min="0" step="0.01" value="${r.rto||''}"
          oninput="setNum(${y},${m},${d},${i},'rto',this.value)"/></div>
    </div>
    <div class="oc-row3"><button class="del-btn" onclick="deleteRow(${y},${m},${d},${i})" title="Delete">✕</button></div>`;
  list.appendChild(card);
}

function renderTotals(y,m,d,block){
  const el=block?block.querySelector(`#dtot-${y}-${m}-${d}`):document.getElementById(`dtot-${y}-${m}-${d}`);
  if(!el)return;
  const rows=getDayRows(y,m,d);
  if(!rows.length){el.style.display='none';return;}
  const s=calcStats(rows);
  el.style.display='grid';
  el.innerHTML=`
    <div class="dt-item"><div class="dt-lbl">Revenue</div><div class="dt-val blue">${fmtM(s.rev)}</div></div>
    <div class="dt-item"><div class="dt-lbl">Expenses</div><div class="dt-val">${fmtM(s.ship+s.fees+s.cost+s.rto)}</div></div>
    <div class="dt-item"><div class="dt-lbl">Net Profit</div><div class="dt-val ${s.net>=0?'green':'red'}">${fmtM(s.net)}</div></div>`;
}

function updateHeader(y,m,d){
  const rows=getDayRows(y,m,d),stats=calcStats(rows);
  const el=document.getElementById(`dhs-${y}-${m}-${d}`);if(!el)return;
  if(rows.length){
    el.innerHTML=`
      <div class="stat-col"><div class="stat-lbl">Orders</div><div class="stat-val sv-orders">${rows.length}</div></div>
      <div class="stat-col"><div class="stat-lbl">Revenue</div><div class="stat-val sv-rev">${fmtM(stats.rev)}</div></div>
      <div class="stat-col"><div class="stat-lbl">Profit</div><div class="stat-val ${stats.net<0?'sv-loss':'sv-profit'}">${stats.net<0?'↓':'↑'}${fmtM(stats.net)}</div></div>`;
    document.getElementById(`db-${y}-${m}-${d}`)?.classList.add('has-data');
  }else{
    el.innerHTML=`<span class="dh-empty">No orders — tap ＋ to add</span>`;
    document.getElementById(`db-${y}-${m}-${d}`)?.classList.remove('has-data');
  }
}

function updateSummary(y,m){
  const ms=getMonthStore(y,m);
  let orders=0,rev=0,ship=0,fees=0,cost=0,rto=0;
  Object.keys(ms).forEach(d=>{
    const rows=ms[d];if(!Array.isArray(rows))return;
    orders+=rows.length;const s=calcStats(rows);
    rev+=s.rev;ship+=s.ship;fees+=s.fees;cost+=s.cost;rto+=s.rto;
  });
  const net=rev-ship-fees-cost-rto;
  document.getElementById('sc-orders').textContent=orders;
  document.getElementById('sc-rev').textContent=fmtM(rev);
  document.getElementById('sc-ship').textContent=fmtM(ship);
  document.getElementById('sc-fees').textContent=fmtM(fees);
  document.getElementById('sc-cost').textContent=fmtM(cost);
  document.getElementById('sc-rto').textContent=fmtM(rto);
  const ne=document.getElementById('sc-net');
  ne.textContent=fmtM(net);ne.className='sc-val '+(net>=0?'green':'red');
}

/* ═══════════════════════════ ADD / DELETE ═══════════════════════════ */
function toggleDay(hdr){hdr.closest('.day-block').classList.toggle('expanded')}

function addRow(y,m,d){
  const rows=getDayRows(y,m,d);
  rows.push({sku:'',sell:0,fees:0,cost:0,rto:0});
  const idx=rows.length-1;
  appendRowEl(y,m,d,idx);
  renderTotals(y,m,d);updateHeader(y,m,d);updateSummary(y,m);
  setTimeout(()=>{const inp=document.querySelector(`#row-${y}-${m}-${d}-${idx} .oc-sku-in`);if(inp)inp.focus()},40);
}

async function deleteRow(y,m,d,i){
  const rows=getDayRows(y,m,d);
  await deleteSB(rows[i]);
  rows.splice(i,1);
  const list=document.getElementById(`olist-${y}-${m}-${d}`);
  if(list){list.innerHTML='';getDayRows(y,m,d).forEach((_,j)=>appendRowEl(y,m,d,j));}
  renderTotals(y,m,d);updateHeader(y,m,d);updateSummary(y,m);
}

/* ═══════════════════════════ FIELD SETTERS ═══════════════════════════ */
async function setTxt(y,m,d,i,key,val){
  getDayRows(y,m,d)[i][key]=val;
  updateHeader(y,m,d);updateSummary(y,m);
  await saveSB(y,m,d,i);
}

async function setNum(y,m,d,i,key,val){
  const rows=getDayRows(y,m,d);
  rows[i][key]=val===''?undefined:parseFloat(val)||0;
  if(key==='sell'){
    const nc=autoCost(rows[i].sell||0);
    if(nc>0){rows[i].cost=nc;const e=document.getElementById(`cost-${y}-${m}-${d}-${i}`);if(e)e.value=nc;
      const nf=autoFees(nc);if(nf>0){rows[i].fees=nf;const ef=document.getElementById(`fees-${y}-${m}-${d}-${i}`);if(ef)ef.value=nf;}
    }
  }
  if(key==='cost'){
    const nf=autoFees(rows[i].cost||0);
    if(nf>0){rows[i].fees=nf;const e=document.getElementById(`fees-${y}-${m}-${d}-${i}`);if(e)e.value=nf;}
  }
  const pc=document.getElementById(`pc-${y}-${m}-${d}-${i}`);
  if(pc){const p=rowProfit(rows[i]);const cls=p>0?'pos':p<0?'neg':'zer';pc.className=`pb ${cls}`;pc.textContent=fmtM(p);}
  renderTotals(y,m,d);updateHeader(y,m,d);updateSummary(y,m);
  await saveSB(y,m,d,i);
}

/* ═══════════════════════════ MODAL ═══════════════════════════ */
function openModal(preDay){
  const y=curY(),m=curM(),days=daysInMonth(y,m);
  const sel=document.getElementById('mDay');sel.innerHTML='';
  for(let d=1;d<=days;d++){
    const o=document.createElement('option');o.value=d;
    o.textContent=`${d} ${MONTHS[m]} (${wdName(y,m,d)})${isToday(y,m,d)?' — Today':''}`;
    if(preDay?d===preDay:isToday(y,m,d))o.selected=true;
    sel.appendChild(o);
  }
  ['mSku','mSell','mFees','mCost','mRto'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mShip').value=DEF_SHIP;
  hideHints();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('mSku').focus(),320);
}
function quickAddDay(y,m,d){openModal(d)}
function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('on');
}
function hideHints(){
  ['mSellHint','mFeesHint','mCostHint'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='';el.classList.remove('show');}});
}
function showHint(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show');}}

function modalAutoFill(){
  const sell=parseFloat(document.getElementById('mSell').value)||0;if(!sell)return;
  const c=autoCost(sell);
  if(c>0){document.getElementById('mCost').value=c;showHint('mCostHint',`Auto-set: ₹${c}`);
    const f=autoFees(c);if(f>0){document.getElementById('mFees').value=f;showHint('mFeesHint',`Auto-set: ₹${f}`);}
  }
}
function modalFeesAutoFill(){
  const cost=parseFloat(document.getElementById('mCost').value)||0;if(!cost)return;
  const f=autoFees(cost);if(f>0){document.getElementById('mFees').value=f;showHint('mFeesHint',`Auto-set: ₹${f}`);}
}

async function quickAdd(){
  const y=curY(),m=curM();
  const d=parseInt(document.getElementById('mDay').value);
  const sku=document.getElementById('mSku').value.trim();
  if(!sku){document.getElementById('mSku').focus();showToast('⚠ Enter a SKU / Order Name');return;}
  const sell=parseFloat(document.getElementById('mSell').value)||0;
  const shipRaw=parseFloat(document.getElementById('mShip').value);
  const fees=parseFloat(document.getElementById('mFees').value)||0;
  const cost=parseFloat(document.getElementById('mCost').value)||0;
  const rto=parseFloat(document.getElementById('mRto').value)||0;
  const rows=getDayRows(y,m,d);
  rows.push({sku,sell,ship:isNaN(shipRaw)?DEF_SHIP:shipRaw,fees,cost,rto});
  const idx=rows.length-1;
  const block=document.getElementById(`db-${y}-${m}-${d}`);
  if(block){
    block.classList.add('expanded');
    const list=document.getElementById(`olist-${y}-${m}-${d}`);
    if(list){appendRowEl(y,m,d,idx);renderTotals(y,m,d);updateHeader(y,m,d);}
  }
  await saveSB(y,m,d,idx);
  updateSummary(y,m);closeModal();
  showToast(`✓ Added for ${d} ${MONTHS[m]}`);
  setTimeout(()=>block&&block.scrollIntoView({behavior:'smooth',block:'center'}),200);
}

/* ═══════════════════════════ EXPORT / IMPORT ═══════════════════════════ */
function exportData(){
  const y=curY(),m=curM();
  const blob=new Blob([JSON.stringify({meta:{v:'2.1',exported:new Date().toISOString()},store},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`amazon_sales_${MONTHS[m]}_${y}.json`});
  a.click();URL.revokeObjectURL(a.href);showToast('✓ Exported');
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);const src=p.store||p.data;
      if(src){
        Object.keys(src).forEach(y=>{if(!store[y])store[y]={};Object.keys(src[y]).forEach(m=>{if(!store[y][m])store[y][m]={};Object.assign(store[y][m],src[y][m]);})});
        renderMonth();showToast('✓ Imported');
      }
    }catch{showToast('✗ Invalid file')}
  };
  r.readAsText(f);ev.target.value='';
}

/* ═══════════════════════════ TOAST ═══════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('on');clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('on'),3000);
}

/* ═══════════════════════════ INIT ═══════════════════════════ */
(async function(){
  const n=new Date();
  document.getElementById('selMonth').value=n.getMonth();
  document.getElementById('selYear').value=n.getFullYear();
  const lo=document.getElementById('loadingOverlay');
  try{
    await loadFromSB();
    renderMonth();
    showToast('✓ Loaded');
  }catch(e){
    renderMonth();
  }finally{
    if(lo)lo.classList.add('hidden');
  }
})();
</script>
